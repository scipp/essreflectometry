name: Nightly test at main branch

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * 1-5'

jobs:
  setup:
    name: Setup variables
    runs-on: 'ubuntu-24.04'
    outputs:
      min_python: ${{ steps.vars.outputs.min_python }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Python version for other CI jobs
        id: vars
        run: echo "min_python=$(< .github/workflows/python-version-ci)" >> "$GITHUB_OUTPUT"

  tests:
    name: Tests
    needs: setup
    strategy:
      matrix:
        os: ['ubuntu-24.04']
        python:
          - version: '${{needs.setup.outputs.min_python}}'
            tox-env: 'nightly'
    uses: ./.github/workflows/test.yml
    with:
      os-variant: ${{ matrix.os }}
      python-version: ${{ matrix.python.version }}
      tox-env: ${{ matrix.python.tox-env }}
      test-artifacts-name: 'essreflectometry-test-artifacts-latest'
    secrets: inherit


  publish:
    name: Publish nightly reduced data
    needs: tests
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download test artifact
        uses: actions/download-artifact@v8
        with:
          name: essreflectometry-test-artifacts-latest
          path: ./artifacts

      - name: Publish to nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly \
            --target ${{ github.sha }} \
            --title "Nightly reduced data files" \
            --notes "Automated nightly build from $(date -u +%Y-%m-%dT%H:%MZ) (commit ${GITHUB_SHA::7})" \
            --prerelease \
            ./artifacts/*
